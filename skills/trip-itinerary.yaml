name: trip_itinerary
version: 1
description: "Day-by-day trip itinerary — relaxed family-paced planning with built-in downtime"
type: workflow
min_tier: trusted

trigger:
  command: "/itinerary"
  keywords:
    - "trip itinerary"
    - "plan the days"
    - "what should we do each day"
    - "day by day plan"
    - "daily itinerary"

vars:
  destination: ""

steps:
  - tool: memory_search
    params:
      query: "trip {{destination}} vacation travel plans"
    store_as: trip_context
    on_error: skip

  - tool: web_search
    params:
      query: "{{destination}} family itinerary day by day with kids"
      count: 5
    store_as: itinerary_ideas
    on_error: skip

  - tool: calendar_search
    params:
      query: "{{destination}} trip travel"
    store_as: trip_dates
    on_error: skip

prompt: |
  Create a relaxed day-by-day family itinerary for {{destination}}.

  What we know about this trip:
  {{trip_context}}

  Itinerary ideas from research:
  {{itinerary_ideas}}

  Trip dates from calendar:
  {{trip_dates}}

  Planning principles:
  - ONE major activity per half-day (morning or afternoon) — families need breathing room
  - Build in downtime: pool time, naps, free exploration
  - Meal suggestions near each day's activities
  - Rainy day backup for each outdoor plan
  - Travel/check-in day should be light
  - Last day: pack and easy activity near the hotel

  Format each day as:
  **Day X: [Theme]**
  - Morning: [activity + logistics]
  - Lunch: [restaurant suggestion near activity]
  - Afternoon: [activity or downtime]
  - Dinner: [restaurant suggestion]
  - Rainy backup: [indoor alternative]

  End with: "Want me to add these to the calendar?"
